model:
  arch: video_llama
  model_type: pretrain_vicuna

  # Audio Q-Former and Video Q-Former
  frozen_llama_proj: True
  frozen_video_Qformer: True
  frozen_audio_Qformer: False
  frozen_audio_llama_proj: False

  # Video-LLaMA
  ckpt:   '/node_data/hboh/neurips24/affectgpt/Video-LLaMA-Series/pretrain_vicuna7b-v2.pth'
  # ckpt_2: '/node_data/hboh/neurips24/affectgpt/Video-LLaMA-Series/pretrain_vicuna7b_audiobranch.pth' # no audio checkpoint

  # Other pre-trained models
  llama_model: '/node_data/hboh/neurips24/affectgpt/vicuna-7b-v0'
  q_former_model: "/node_data/hboh/neurips24/affectgpt/blip2_pretrained_flant5xxl.pth"
  imagebind_ckpt_path: "/node_data/hboh/neurips24/affectgpt/imagebind_huge.pth"


# max_length < 2048
# max_length=512, most samples satisty this condition
# max_length=320, few samples  satisty this condition
datasets:
  audio_pretrain:
    data_type: audio
    build_info:
      ann_path: /node_data/hboh/neurips24/qa_audio_pretrain.json
      vis_root: /node_data/hboh/neurips24/train_audiocaps_clotho_soundbible_audioset/
    vis_processor:
      train:
        name: "alpro_video_train"
        n_frms: 8
        image_size: 224
    text_processor:
      train:
        name: "blip_caption"
    num_audio_query_token: 32
    num_video_query_token: 32
    tokenizer_name: "/node_data/hboh/neurips24/affectgpt/vicuna-7b-v0"
    max_length: 512

  # webvid_instruct:
  #   data_type: video
  #   build_info:
  #     ann_path: /node_data/hboh/neurips24/0525_sanity_test/qa_videollama.json
  #     vis_root: /node_data/hboh/neurips24/0525_sanity_test/videos/
  #   vis_processor:
  #     train:
  #       name: "alpro_video_train"
  #       n_frms: 8
  #       image_size: 224
  #   text_processor:
  #     train:
  #       name: "blip_caption"
  #   num_audio_query_token: 8
  #   num_video_query_token: 32
  #   tokenizer_name: "/node_data/hboh/neurips24/checkpoints/videollama/Video-LLaMA-2-7B-Pretrained/llama-2-7b-chat-hf"
  #   max_length: 512


run:
  task: video_text_pretrain

  # optimizer
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 3e-5
  min_lr: 1e-5
  warmup_lr: 1e-6
  weight_decay: 0.05

  max_epoch: 100
  iters_per_epoch: 5000 #1000
  warmup_steps: 1000 # 1000

  batch_size_train: 32
  batch_size_eval: 2

  seed: 42
  num_workers: 4

  amp: True # auto mixed precision, multiplication (fp16), addition (fp32)
  resume_ckpt_path: null # continue training from resume_ckpt_path

  evaluate: False 
  train_splits: ["train"]

  device: "cuda" 
  world_size: 1
  dist_url: "env://"
  distributed: True